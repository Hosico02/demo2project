<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MatrixOmnix project icon</title>
  <desc id="desc">A futuristic matrix-grid app icon with a glowing angular M and X monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="920" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090E1B"/>
      <stop offset="0.42" stop-color="#111A32"/>
      <stop offset="1" stop-color="#050713"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="78%" cy="20%" r="68%">
      <stop offset="0" stop-color="#34E7FF" stop-opacity="0.52"/>
      <stop offset="0.42" stop-color="#34E7FF" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34E7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="22%" cy="82%" r="70%">
      <stop offset="0" stop-color="#8F5BFF" stop-opacity="0.45"/>
      <stop offset="0.46" stop-color="#8F5BFF" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#8F5BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neonStroke" x1="246" y1="306" x2="785" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62F7FF"/>
      <stop offset="0.48" stop-color="#B7FFFB"/>
      <stop offset="1" stop-color="#8B5CFF"/>
    </linearGradient>
    <linearGradient id="xStroke" x1="340" y1="340" x2="684" y2="704" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CFFEF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#5E8BFF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#B05CFF" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ringStroke" x1="224" y1="180" x2="824" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29F2FF"/>
      <stop offset="0.5" stop-color="#3559FF"/>
      <stop offset="1" stop-color="#A95CFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.20 0 0 0 0 0.85 0 0 0 0 1.00 0 0 0 0.72 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="violetLineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.62 0 0 0 0 0.26 0 0 0 0 1.00 0 0 0 0.62 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect x="64" y="64" width="896" height="896" rx="178" ry="178"/>
    </clipPath>
    <pattern id="microDots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.2" fill="#C6FFFF" opacity="0.18"/>
    </pattern>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="64" y="64" width="896" height="896" rx="178" fill="url(#bg)"/>
  </g>
  <g clip-path="url(#roundClip)">
    <rect x="64" y="64" width="896" height="896" fill="url(#cyanGlow)"/>
    <rect x="64" y="64" width="896" height="896" fill="url(#violetGlow)"/>
    <rect x="64" y="64" width="896" height="896" fill="url(#microDots)" opacity="0.72"/>

    <!-- Matrix grid -->
    <g opacity="0.52">
      <path d="M128 160H896 M128 224H896 M128 288H896 M128 352H896 M128 416H896 M128 480H896 M128 544H896 M128 608H896 M128 672H896 M128 736H896 M128 800H896 M128 864H896" stroke="#72F7FF" stroke-width="1.4" opacity="0.15"/>
      <path d="M160 128V896 M224 128V896 M288 128V896 M352 128V896 M416 128V896 M480 128V896 M544 128V896 M608 128V896 M672 128V896 M736 128V896 M800 128V896 M864 128V896" stroke="#B88CFF" stroke-width="1.4" opacity="0.13"/>
      <path d="M128 480H896 M512 128V896" stroke="#BFFFFF" stroke-width="2" opacity="0.13"/>
    </g>

    <!-- matrix code sparks -->
    <g opacity="0.48" fill="#9DFFFF">
      <rect x="210" y="187" width="7" height="30" rx="3.5" opacity="0.42"/>
      <rect x="242" y="248" width="6" height="18" rx="3" opacity="0.25"/>
      <rect x="819" y="204" width="7" height="36" rx="3.5" opacity="0.35"/>
      <rect x="782" y="268" width="5" height="22" rx="2.5" opacity="0.23"/>
      <rect x="170" y="737" width="6" height="34" rx="3" opacity="0.36"/>
      <rect x="831" y="730" width="6" height="26" rx="3" opacity="0.34"/>
      <rect x="307" y="836" width="6" height="24" rx="3" opacity="0.26"/>
      <rect x="673" y="150" width="6" height="24" rx="3" opacity="0.25"/>
    </g>

    <!-- Omnidirectional ring -->
    <g filter="url(#violetLineGlow)">
      <path d="M512 172 L794 312 L840 618 L632 842 L324 842 L116 618 L162 312 Z" fill="none" stroke="url(#ringStroke)" stroke-width="14" stroke-linejoin="round" opacity="0.48"/>
      <path d="M512 172 L794 312 M840 618 L632 842 M324 842 L116 618 M162 312 L512 172" fill="none" stroke="#E9FFFF" stroke-width="2.8" stroke-linecap="round" opacity="0.42"/>
    </g>

    <!-- diagonal X, representing OmniX crossing paths -->
    <g filter="url(#violetLineGlow)" opacity="0.88">
      <path d="M354 335 L666 693" stroke="url(#xStroke)" stroke-width="52" stroke-linecap="round" opacity="0.64"/>
      <path d="M666 335 L354 693" stroke="url(#xStroke)" stroke-width="52" stroke-linecap="round" opacity="0.64"/>
      <path d="M354 335 L666 693 M666 335 L354 693" stroke="#F3FFFF" stroke-width="7" stroke-linecap="round" opacity="0.33"/>
    </g>

    <!-- central Matrix M monogram -->
    <g filter="url(#glow)">
      <path d="M282 700 L282 338 L512 574 L742 338 L742 700" fill="none" stroke="#05101C" stroke-width="86" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>
      <path d="M282 700 L282 338 L512 574 L742 338 L742 700" fill="none" stroke="url(#neonStroke)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M282 700 L282 338 L512 574 L742 338 L742 700" fill="none" stroke="#F5FFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
    </g>

    <!-- node accents -->
    <g filter="url(#glow)">
      <circle cx="282" cy="338" r="18" fill="#C9FFFF"/>
      <circle cx="512" cy="574" r="20" fill="#F5FFFF"/>
      <circle cx="742" cy="338" r="18" fill="#D7C2FF"/>
      <circle cx="282" cy="700" r="15" fill="#70F8FF"/>
      <circle cx="742" cy="700" r="15" fill="#A879FF"/>
      <circle cx="512" cy="172" r="10" fill="#7EFBFF" opacity="0.85"/>
      <circle cx="840" cy="618" r="10" fill="#A66DFF" opacity="0.85"/>
      <circle cx="324" cy="842" r="10" fill="#72F7FF" opacity="0.85"/>
    </g>

    <!-- glossy edge -->
    <rect x="84" y="84" width="856" height="856" rx="158" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.11"/>
    <path d="M164 190 C270 103, 498 86, 707 121 C826 141, 903 207, 936 291" fill="none" stroke="#FFFFFF" stroke-width="5" opacity="0.08" stroke-linecap="round"/>
  </g>
</svg>
