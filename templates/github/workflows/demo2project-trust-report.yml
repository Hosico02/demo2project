name: Demo2Project trust report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Trust report
        run: node dist/cli/index.js trust:report --project .
      - name: Audit verify
        run: node dist/cli/index.js audit:verify
      - uses: actions/upload-artifact@v4
        with:
          name: trust-report
          path: reports/trust/
          if-no-files-found: warn
