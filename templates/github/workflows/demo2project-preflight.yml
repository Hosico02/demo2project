name: Demo2Project preflight (read-only)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Demo2Project doctor
        run: node dist/cli/index.js doctor
      - name: Analyze + gap + qa preflight (read-only)
        run: |
          node dist/cli/index.js analyze --project .
          node dist/cli/index.js gap --project .
          node dist/cli/index.js qa:preflight --project .
