name: Demo2Project CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: corepack prepare pnpm@11.0.9 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

