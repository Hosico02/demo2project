services:
  - type: web
    name: matrixomnix
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --dir site build
    staticPublishPath: site/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
